<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dépôt note de frais</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;margin:0;background:#f6f7fb;color:#111}
    .wrap{max-width:760px;margin:0 auto;padding:16px}
    .card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 8px 24px rgba(0,0,0,.08);margin:12px 0}
    h1{font-size:20px;margin:0 0 8px}
    label{display:block;font-size:13px;margin:10px 0 6px;color:#333}
    input, textarea{width:100%;box-sizing:border-box;padding:12px;border:1px solid #d8dbe7;border-radius:12px;font-size:16px;background:#fff}
    textarea{min-height:84px;resize:vertical}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    button{border:0;border-radius:12px;padding:12px 14px;font-size:16px;cursor:pointer}
    .primary{background:#2563eb;color:#fff}
    .danger{background:#ef4444;color:#fff}
    .muted{color:#666;font-size:12px}
    .loading{opacity:.6;pointer-events:none}
    .checkline{display:flex;align-items:center;gap:10px;margin-top:10px}
    .checkline input{width:auto}
    .pill{display:inline-block;padding:2px 8px;border-radius:999px;background:#eef2ff;color:#3730a3;font-size:12px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Dépôt de note de frais</h1>
      <div class="muted">
        Tous les champs sont obligatoires. Date autorisée : <b>du 01/01 de l’année précédente</b> à <b>aujourd’hui</b>.
      </div>
      <div class="muted" style="margin-top:6px">
        Session : <span class="pill" id="sessionPill"></span>
      </div>
    </div>

    <div class="card" id="formCard">
      <div class="row">
        <div>
          <label>Nom</label>
          <input id="nom" required autocomplete="family-name" />
        </div>
        <div>
          <label>Prénom</label>
          <input id="prenom" required autocomplete="given-name" />
        </div>
      </div>

      <div class="row">
        <div>
          <label>Date de la dépense</label>
          <input id="dateDepense" type="date" required />
        </div>
        <div>
          <label>Montant (€)</label>
          <input id="montant" inputmode="decimal" placeholder="ex: 18,50" required />
        </div>
      </div>

      <label>Commentaire</label>
      <textarea id="commentaire" required placeholder="ex: déplacement / achat matériel..."></textarea>

      <div class="checkline">
        <input id="cbEsl" type="checkbox" />
        <label for="cbEsl" style="margin:0">CB ESL</label>
      </div>

      <label>Justificatif (photo ou fichier)</label>
      <!-- Important : PAS de capture=... pour laisser le choix sur mobile -->
      <input id="photo" type="file" accept="image/*" required />
      <div class="muted" id="hint"></div>

      <div class="btns">
        <button class="primary" id="sendBtn">Envoyer la note</button>
        <button class="danger" id="resetBtn">Réinitialiser</button>
      </div>
    </div>
  </div>

<script>
  /**************** CONFIG ****************/
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxc3nC6iROsnVslalW6GPg6rI_fO2FXCAM3l-NOyH2QKdtwvZLkRPX_HNIyMf8q7ILZug/exec";
  const API_KEY = ""; // optionnel

  const $ = (id) => document.getElementById(id);
  function setLoading(v){ $("formCard").classList.toggle("loading", v); }

  function requiredValue(el, label){
    const v = (el.value || "").trim();
    if(!v) throw new Error(`Champ obligatoire : ${label}`);
    return v;
  }

  function parseMontant(v){
    const n = Number(String(v).replace(",", "."));
    if(!isFinite(n) || n <= 0) throw new Error("Montant invalide (doit être > 0).");
    return n.toFixed(2);
  }

  function computeDateBounds(){
    const now = new Date();
    const year = now.getFullYear();
    const min = new Date(year - 1, 0, 1); // 01/01 année-1
    const max = new Date(year, now.getMonth(), now.getDate()); // aujourd'hui
    const fmt = (d) => d.toISOString().slice(0,10);
    return { min: fmt(min), max: fmt(max) };
  }

  function validateDate(dateStr){
    const {min, max} = computeDateBounds();
    if(dateStr < min) throw new Error("Date interdite : antérieure au 01/01 de l’année précédente.");
    if(dateStr > max) throw new Error("Date interdite : postérieure à aujourd’hui.");
  }

  /*************** SessionID ***************/
  // Utile pour logs/anti-abus côté serveur, et pour identifier l’utilisateur en cas de souci.
  const SESSION_KEY = "ndf_session_id_single_v2";
  const sessionId = localStorage.getItem(SESSION_KEY) || crypto.randomUUID();
  localStorage.setItem(SESSION_KEY, sessionId);
  document.getElementById("sessionPill").textContent = sessionId;

  /*************** Image: conversion + compression ***************/
  function readAsDataURL(file){
    return new Promise((resolve, reject)=>{
      const r = new FileReader();
      r.onload = () => resolve(r.result);
      r.onerror = reject;
      r.readAsDataURL(file);
    });
  }

  function loadImage(dataUrl){
    return new Promise((resolve, reject)=>{
      const img = new Image();
      img.onload = ()=>resolve(img);
      img.onerror = reject;
      img.src = dataUrl;
    });
  }

  function estimateBytesFromDataUrl(dataUrl){
    // bytes approx = base64_len * 3/4
    const i = dataUrl.indexOf(",") + 1;
    const b64len = Math.max(0, dataUrl.length - i);
    return Math.floor(b64len * 0.75);
  }

  /**
   * Convertit n'importe quelle image lisible par le navigateur en JPEG,
   * et compresse (downscale + qualité) si besoin.
   *
   * - maxW: largeur max
   * - targetBytes: poids cible approximatif (ex: 1.5MB)
   */
  async function toJpegCompressedDataUrl(file, maxW=1600, targetBytes=1_500_000){
    if(!file.type.startsWith("image/")) throw new Error("Fichier invalide : image attendue.");

    const src = await readAsDataURL(file);
    const img = await loadImage(src);

    const ratio = Math.min(1, maxW / img.width);
    const w = Math.round(img.width * ratio);
    const h = Math.round(img.height * ratio);

    const canvas = document.createElement("canvas");
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(img, 0, 0, w, h);

    // Si l'image source est déjà petite, on encode en JPEG haute qualité
    let q = 0.86;
    let out = canvas.toDataURL("image/jpeg", q);

    // Ajuste la qualité pour viser targetBytes
    while(estimateBytesFromDataUrl(out) > targetBytes && q > 0.45){
      q -= 0.08;
      out = canvas.toDataURL("image/jpeg", q);
    }
    return out; // data:image/jpeg;base64,...
  }

  /*************** API call ***************/
  async function postToGAS(payload){
    if(APPS_SCRIPT_URL.includes("PASTE_")) throw new Error("Configure APPS_SCRIPT_URL dans index.html");

    const res = await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      redirect: "follow",
      // Important pour éviter preflight CORS avec Apps Script:
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload)
    });

    const text = await res.text();
    try { return JSON.parse(text); }
    catch { return { ok:false, error:"Réponse non-JSON", raw:text }; }
  }

  function resetForm({ keepIdentity=true } = {}){
    const nom = $("nom").value;
    const prenom = $("prenom").value;

    $("dateDepense").value = "";
    $("montant").value = "";
    $("commentaire").value = "";
    $("cbEsl").checked = false;
    $("photo").value = "";

    if(!keepIdentity){
      $("nom").value = "";
      $("prenom").value = "";
    } else {
      $("nom").value = nom;
      $("prenom").value = prenom;
    }
  }

  // init date min/max
  const bounds = computeDateBounds();
  $("dateDepense").min = bounds.min;
  $("dateDepense").max = bounds.max;
  $("hint").textContent = "Choisissez une photo OU un fichier. L'image sera convertie/compressée en JPEG automatiquement si nécessaire.";

  $("sendBtn").addEventListener("click", async () => {
    try {
      const nom = requiredValue($("nom"), "Nom");
      const prenom = requiredValue($("prenom"), "Prénom");
      const dateDepense = requiredValue($("dateDepense"), "Date de la dépense");
      validateDate(dateDepense);
      const montant = parseMontant(requiredValue($("montant"), "Montant"));
      const commentaire = requiredValue($("commentaire"), "Commentaire");
      const cbEsl = $("cbEsl").checked;

      const file = $("photo").files?.[0];
      if(!file) throw new Error("Justificatif obligatoire.");

      setLoading(true);

      // Convertit et compresse (toujours JPEG côté serveur)
      const dataUrl = await toJpegCompressedDataUrl(file, 1600, 1_500_000);

      const payload = {
        action: "submitExpense",
        apiKey: API_KEY,
        sessionId,
        nom,
        prenom,
        dateDepense,
        montant,
        commentaire,
        cbEsl,
        dataUrl
      };

      const out = await postToGAS(payload);
      setLoading(false);

      if(!out.ok) throw new Error(out.error || "Erreur inconnue.");

      alert("✅ Envoyé ! Merci.");
      // Reset après validation
      resetForm({ keepIdentity:true });

    } catch(e) {
      setLoading(false);
      alert("❌ " + (e?.message || e));
    }
  });

  $("resetBtn").addEventListener("click", () => {
    if(confirm("Réinitialiser le formulaire ?")){
      resetForm({ keepIdentity:false });
    }
  });
</script>
</body>
</html>
